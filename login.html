<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bank Risk Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11m16-11v11"/>
                        </svg>
                    </div>
                    <h1 class="login-title">Bank Risk Management</h1>
                    <p class="login-subtitle">Sistem Manajemen Risiko & Loss Event</p>
                </div>
                
                <div class="login-body">
                    <div id="alertContainer"></div>
                    
                    <form id="loginForm">
                        <div class="form-group">
                            <label class="form-label required" for="username">Username</label>
                            <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan username" required autofocus>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label required" for="password">Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan password" required>
                                <button type="button" class="password-toggle" onclick="togglePassword()">
                                    <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: 1rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M13.8 12H3"/>
                            </svg>
                            Masuk
                        </button>
                    </form>
                    
                    <div class="demo-credentials">
                        <div class="demo-credentials-title">Demo Login:</div>
                        <div class="demo-credentials-item"><span>Admin:</span><span><code>admin</code> / <code>password</code></span></div>
                        <div class="demo-credentials-item"><span>Teller:</span><span><code>teller1</code> / <code>password</code></span></div>
                        <div class="demo-credentials-item"><span>CS:</span><span><code>cs1</code> / <code>password</code></span></div>
                        <div class="demo-credentials-item"><span>KC:</span><span><code>kc1</code> / <code>password</code></span></div>
                    </div>
                </div>
                
                <div class="login-footer">
                    <p>Data disimpan di browser (localStorage)</p>
                    <p style="margin-top: 0.25rem; font-size: 0.75rem;">v1.0.0 - Static Version</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Check if already logged in
        if (isLoggedIn()) {
            window.location.href = 'index.html';
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const result = login(username, password);
            
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                showAlert(result.message, 'danger');
            }
        });

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                `;
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type}">
                    <svg class="alert-icon" viewBox="0 0 20 20" fill="currentColor" style="width: 20px; height: 20px;">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                    <div>${message}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
